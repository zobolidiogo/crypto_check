{% extends "layout.html" %}

{% block title %}Comprar {{ crypto | crypto_name_format }}{% endblock %}

{% block content %}
<h1>Comprar {{ crypto | crypto_name_format }}</h1>
<p>Preço atual: {{ preco | usd }}</p>

<form action="/buy/{{ crypto }}" method="post">
    <div class="formulario">
        <input type="number" autofocus class="pergunta" id="quantidade" name="quantidade" min="0.00001" step="0.00001" placeholder="Quantidade a comprar" data-preco="{{ preco }}">
    </div>
    <button type="submit">Comprar</button>
</form>
<p id="total"></p>

<script src="/static/trade.js"></script>

{% endblock %}
